services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: verdict
      POSTGRES_USER: verdict
      POSTGRES_PASSWORD: verdict
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdict -d verdict"]
      interval: 3s
      timeout: 3s
      retries: 20
